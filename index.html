<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gantt Index</title>
  <style>
    :root {
      --bg1: #f1f5f9;
      --bg2: #e0f2fe;
      --card: #ffffff;
      --line: #cbd5e1;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0f766e;
      --primary2: #134e4a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Segoe UI, Tahoma, sans-serif;
      background:
        radial-gradient(circle at 8% 10%, #dbeafe 0, transparent 32%),
        radial-gradient(circle at 92% 15%, #cffafe 0, transparent 35%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      backdrop-filter: blur(3px);
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.3px;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-top: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--primary2);
      background: #ecfeff;
      font-weight: 600;
      padding: 9px 12px;
      border-radius: 9px;
      transition: transform 120ms ease, background 120ms ease;
    }

    .btn:hover {
      background: #ccfbf1;
      transform: translateY(-1px);
    }

    .viewer {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.95rem;
    }

    iframe {
      width: 100%;
      height: 74vh;
      border: 0;
      background: #fff;
    }

    @media (max-width: 700px) {
      iframe { height: 64vh; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Gantt Dashboard</h1>
      <div class="meta">Lokal index for Tidplan och Gantt-visning</div>

      <div class="actions">
        <a class="btn" href="tidplan_gantt_status_per_land.html" target="_blank" rel="noopener">Oppna Gantt (HTML)</a>
        <a class="btn" href="tidplan_gantt_kalkyl.html" target="_blank" rel="noopener">Oppna Kalkylering (HTML)</a>
        <a class="btn" href="tidplan_gantt_status_per_land.html?source=published" target="_blank" rel="noopener">Chef-lank: Publicerad status</a>
        <a class="btn" href="tidplan_gantt_kalkyl.html?source=published" target="_blank" rel="noopener">Chef-lank: Publicerad planering</a>
        <a class="btn" href="tidplan_gantt_status_per_land.md" target="_blank" rel="noopener">Oppna Gantt (MD)</a>
        <a class="btn" href="Tidplan.xlsx" target="_blank" rel="noopener">Oppna Tidplan.xlsx</a>
      </div>
    </section>

    <section class="viewer">
      <div class="viewer-head">
        <span>Inbyggd forhandsvisning</span>
        <span>tidplan_gantt_status_per_land.html</span>
      </div>
      <iframe id="ganttFrame" src="tidplan_gantt_status_per_land.html" title="Gantt forhandsvisning" allowfullscreen></iframe>
    </section>
  </div>
  <script>
    const frame = document.getElementById('ganttFrame');
    if (frame) {
      frame.src = `tidplan_gantt_status_per_land.html?v=${Date.now()}`;
    }
  </script>
</body>
</html>
